name: Automatic Version Bump

on:
    push:
        branches:
            - main
            - "epic/**"
    workflow_dispatch:
        inputs:
            pr_number:
                description: "PR number to bump from (for manual retries)"
                required: false
                type: string

jobs:
    bump-version:
        if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'ci: bump version')"
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.ref_name }}
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Resolve PR and source branch
              id: pr
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if [ -n "${{ github.event.inputs.pr_number }}" ]; then
                    PR_NUM="${{ github.event.inputs.pr_number }}"
                  else
                    # Parse "(#NN)" or "from <owner>/<branch>" from commit message
                    MSG="${{ github.event.head_commit.message }}"
                    PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
                  fi

                  if [ -z "$PR_NUM" ]; then
                    echo "No PR number found in commit message — nothing to bump"
                    echo "skip=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  BRANCH=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName')
                  if [ -z "$BRANCH" ]; then
                    echo "Could not resolve branch for PR #$PR_NUM"
                    echo "skip=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
                  echo "source_branch=$BRANCH" >> $GITHUB_OUTPUT
                  echo "Resolved PR #$PR_NUM from branch: $BRANCH"

            - name: Determine bump type
              id: bump_type
              if: steps.pr.outputs.skip != 'true'
              run: |
                  BRANCH="${{ steps.pr.outputs.source_branch }}"
                  BUMP_TYPE="none"

                  if [[ $BRANCH == epic/* ]]; then
                    BUMP_TYPE="major"
                  elif [[ $BRANCH == feature/* ]]; then
                    BUMP_TYPE="minor"
                  elif [[ $BRANCH == task/* || $BRANCH == bug/* ]]; then
                    BUMP_TYPE="patch"
                  elif [[ $BRANCH == hotfix/* ]]; then
                    BUMP_TYPE="hotfix"
                  fi

                  echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
                  echo "Bump type: $BUMP_TYPE"

            - name: Read current version
              id: current_version
              if: steps.bump_type.outputs.bump_type != 'none' && steps.bump_type.outputs.bump_type != ''
              run: |
                  CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
                  echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

            - name: Calculate new version
              id: new_version
              if: steps.bump_type.outputs.bump_type != 'none' && steps.bump_type.outputs.bump_type != ''
              run: |
                  CURRENT="${{ steps.current_version.outputs.current }}"
                  BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"

                  if [[ $CURRENT =~ ^([0-9]{2})\.([0-9]+)\.([0-9]+)\.([0-9]+)([a-zA-Z]*)$ ]]; then
                    YY="${BASH_REMATCH[1]}"
                    MAJOR="${BASH_REMATCH[2]}"
                    MINOR="${BASH_REMATCH[3]}"
                    PATCH="${BASH_REMATCH[4]}"
                    SUFFIX="${BASH_REMATCH[5]}"
                  else
                    echo "Error: Invalid version format: $CURRENT"
                    exit 1
                  fi

                  CURRENT_YY=$(date +%y)
                  if [ "$YY" != "$CURRENT_YY" ]; then
                    NEW_VERSION="${CURRENT_YY}.0.0.0"
                  else
                    case "$BUMP_TYPE" in
                      major)
                        MAJOR=$((MAJOR + 1))
                        MINOR=0
                        PATCH=0
                        SUFFIX=""
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                        ;;
                      minor)
                        MINOR=$((MINOR + 1))
                        PATCH=0
                        SUFFIX=""
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                        ;;
                      patch)
                        PATCH=$((PATCH + 1))
                        SUFFIX=""
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                        ;;
                      hotfix)
                        if [ -z "$SUFFIX" ]; then
                          SUFFIX="a"
                        else
                          SUFFIX=$(python3 -c "
def inc(s):
    chars = list(s)
    i = len(chars) - 1
    while i >= 0:
        if chars[i] == 'z':
            chars[i] = 'a'
            i -= 1
        else:
            chars[i] = chr(ord(chars[i]) + 1)
            return ''.join(chars)
    return 'a' + ''.join(chars)
print(inc('$SUFFIX'))
")
                        fi
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH$SUFFIX"
                        ;;
                    esac
                  fi

                  echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "New version: $NEW_VERSION"

            - name: Update version files
              if: steps.new_version.outputs.new != ''
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"
                  echo "$NEW_VERSION" > VERSION

                  if [ -f package.json ]; then
                    sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json
                  fi

                  if [ -f README.md ]; then
                    sed -i "s|version-[0-9a-zA-Z.]*-blue|version-$NEW_VERSION-blue|" README.md
                  fi

                  find . -maxdepth 4 -name "pyproject.toml" \
                    -not -path "*/node_modules/*" \
                    -not -path "*/.pio/*" \
                    -not -path "*/vendor/*" \
                    -not -path "*/.venv/*" | while read -r f; do
                    if grep -q '^version' "$f"; then
                      sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" "$f"
                    fi
                  done

            - name: Commit and push
              if: steps.new_version.outputs.new != ''
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"
                  BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"
                  BRANCH="${{ steps.pr.outputs.source_branch }}"

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add -A
                  git diff --cached --quiet && { echo "No changes to commit"; exit 0; }

                  git commit -m "ci: bump version to $NEW_VERSION [skip ci]" \
                    -m "Automatic $BUMP_TYPE bump after merging $BRANCH"
                  git push origin "${{ github.ref_name }}"

            - name: Summary
              if: steps.new_version.outputs.new != ''
              run: |
                  echo "## Version Bump Summary" >> $GITHUB_STEP_SUMMARY
                  echo "- **PR**: #${{ steps.pr.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Source branch**: ${{ steps.pr.outputs.source_branch }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Bump type**: ${{ steps.bump_type.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Previous**: ${{ steps.current_version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **New**: ${{ steps.new_version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
