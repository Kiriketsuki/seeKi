name: Automatic Version Bump

on:
    pull_request:
        branches:
            - main
            - "epic/**"
        types: [closed]

jobs:
    bump-version:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.base.ref }}
                  fetch-depth: 0

            - name: Determine version bump type
              id: bump_type
              run: |
                  BRANCH_NAME="${{ github.head_ref }}"
                  BASE_BRANCH="${{ github.base_ref }}"
                  echo "Source branch: $BRANCH_NAME"
                  echo "Base branch: $BASE_BRANCH"

                  BUMP_TYPE="none"

                  if [[ $BRANCH_NAME == epic/* ]]; then
                    BUMP_TYPE="major"
                    echo "Detected epic branch. Bump: Major."
                  elif [[ $BRANCH_NAME == feature/* ]]; then
                    BUMP_TYPE="minor"
                    echo "Detected feature branch. Bump: Minor."
                  elif [[ $BRANCH_NAME == task/* || $BRANCH_NAME == bug/* ]]; then
                    BUMP_TYPE="patch"
                    echo "Detected task/bug branch. Bump: Patch."
                  elif [[ $BRANCH_NAME == hotfix/* ]]; then
                    BUMP_TYPE="hotfix"
                    echo "Detected hotfix branch. Bump: Suffix."
                  fi

                  echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

            - name: Read current version
              id: current_version
              if: steps.bump_type.outputs.bump_type != 'none'
              run: |
                  if [ -f VERSION ]; then
                    CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
                    echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
                    echo "Current version: $CURRENT_VERSION"
                  else
                    echo "Error: No VERSION file found"
                    exit 1
                  fi

            - name: Calculate new version
              id: new_version
              if: steps.bump_type.outputs.bump_type != 'none'
              run: |
                  CURRENT="${{ steps.current_version.outputs.current }}"
                  BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"

                  # Parse YY.Major.Minor.Patch[Suffix]
                  if [[ $CURRENT =~ ^([0-9]{2})\.([0-9]+)\.([0-9]+)\.([0-9]+)([a-zA-Z]*)$ ]]; then
                    YY="${BASH_REMATCH[1]}"
                    MAJOR="${BASH_REMATCH[2]}"
                    MINOR="${BASH_REMATCH[3]}"
                    PATCH="${BASH_REMATCH[4]}"
                    SUFFIX="${BASH_REMATCH[5]}"
                  else
                    echo "Error: Invalid version format: $CURRENT"
                    echo "Expected: YY.Major.Minor.Patch[Suffix] (e.g. 26.3.2.1 or 26.3.2.1a)"
                    exit 1
                  fi

                  # Year rollover check
                  CURRENT_YY=$(date +%y)
                  if [ "$YY" != "$CURRENT_YY" ]; then
                    echo "New year detected ($YY -> $CURRENT_YY). Resetting all components."
                    NEW_VERSION="${CURRENT_YY}.0.0.0"
                  else
                    case "$BUMP_TYPE" in
                      major)
                        MAJOR=$((MAJOR + 1))
                        SUFFIX=""
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                        ;;
                      minor)
                        MINOR=$((MINOR + 1))
                        PATCH=0
                        SUFFIX=""
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                        ;;
                      patch)
                        PATCH=$((PATCH + 1))
                        SUFFIX=""
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                        ;;
                      hotfix)
                        if [ -z "$SUFFIX" ]; then
                          SUFFIX="a"
                        else
                          # Increment suffix as base-26: a..z, aa..az, ba..zz, aaa...
                          SUFFIX=$(python3 -c "
def inc(s):
    chars = list(s)
    i = len(chars) - 1
    while i >= 0:
        if chars[i] == 'z':
            chars[i] = 'a'
            i -= 1
        else:
            chars[i] = chr(ord(chars[i]) + 1)
            return ''.join(chars)
    return 'a' + ''.join(chars)
print(inc('$SUFFIX'))
")
                        fi
                        NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH$SUFFIX"
                        ;;
                    esac
                  fi

                  echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "New version: $NEW_VERSION"

            - name: Update version files
              if: steps.bump_type.outputs.bump_type != 'none'
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"

                  # 1. Update VERSION file
                  echo "$NEW_VERSION" > VERSION
                  echo "Updated VERSION to $NEW_VERSION"

                  # 2. Update package.json (if exists)
                  if [ -f package.json ]; then
                    sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json
                    echo "Updated package.json to $NEW_VERSION"
                  fi

                  # 3. Update README version badge (if exists)
                  if [ -f README.md ]; then
                    sed -i "s|version-[0-9a-zA-Z.]*-blue|version-$NEW_VERSION-blue|" README.md
                    echo "Updated README badge to $NEW_VERSION"
                  fi

                  # 4. Update all pyproject.toml files (excluding vendored dirs)
                  find . -maxdepth 4 -name "pyproject.toml" \
                    -not -path "*/node_modules/*" \
                    -not -path "*/.pio/*" \
                    -not -path "*/vendor/*" \
                    -not -path "*/.venv/*" | while read -r f; do
                    if grep -q '^version' "$f"; then
                      sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" "$f"
                      echo "Updated $f to $NEW_VERSION"
                    fi
                  done

            - name: Commit and push
              if: steps.bump_type.outputs.bump_type != 'none'
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"
                  BUMP_TYPE="${{ steps.bump_type.outputs.bump_type }}"
                  TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add -A
                  git diff --cached --quiet && { echo "No changes to commit"; exit 0; }

                  git commit -m "ci: bump version to $NEW_VERSION [skip ci]" \
                    -m "Automatic $BUMP_TYPE bump after merging ${{ github.head_ref }}"
                  git push origin "$TARGET_BRANCH"

            - name: Summary
              if: steps.bump_type.outputs.bump_type != 'none'
              run: |
                  echo "## Version Bump Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Branch**: ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Bump Type**: ${{ steps.bump_type.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Previous Version**: ${{ steps.current_version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **New Version**: ${{ steps.new_version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
