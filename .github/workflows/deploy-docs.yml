name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docs index
        run: |
          mkdir -p docs
          python3 - << 'EOF'
          import os
          import re

          docs_dir = "docs"
          html_files = []

          for root, dirs, files in os.walk(docs_dir):
              dirs[:] = [d for d in dirs if d != '.gitkeep']
              for f in files:
                  if f.endswith(".html"):
                      rel_path = os.path.relpath(os.path.join(root, f), docs_dir)
                      html_files.append(rel_path)

          html_files.sort()

          def extract_title(path):
              try:
                  with open(os.path.join(docs_dir, path), "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read(2048)
                      m = re.search(r"<title[^>]*>(.*?)</title>", content, re.IGNORECASE | re.DOTALL)
                      if m:
                          return re.sub(r"\s+", " ", m.group(1)).strip()
              except Exception:
                  pass
              return os.path.basename(path).replace(".html", "").replace("-", " ").replace("_", " ").title()

          groups = {}
          for path in html_files:
              parts = path.split("/")
              group = parts[0] if len(parts) >= 2 else "other"
              groups.setdefault(group, []).append(path)

          sections = ""
          for group, entries in sorted(groups.items()):
              items = ""
              for path in entries:
                  title = extract_title(path)
                  items += f'      <li><a href="{path}">{title}</a></li>\n'
              sections += f"""
            <section>
              <h2>{group.replace("-", " ").replace("_", " ").title()}</h2>
              <ul>
          {items}      </ul>
            </section>
          """

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SeeKi Documentation</title>
            <style>
              body {{ font-family: Inter, system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; background: #F5F0EB; color: #2F4858; }}
              h1 {{ font-size: 1.75rem; margin-bottom: 0.5rem; }}
              p.subtitle {{ color: #8a7a6c; margin-bottom: 2rem; }}
              section {{ margin-bottom: 2rem; }}
              h2 {{ font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #2F4858; border-bottom: 1px solid #e0d8d0; padding-bottom: 0.5rem; margin-bottom: 1rem; }}
              ul {{ list-style: none; padding: 0; margin: 0; }}
              li {{ margin-bottom: 0.5rem; }}
              a {{ color: #00A9A5; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              .empty {{ color: #a0917f; font-style: italic; }}
            </style>
          </head>
          <body>
            <h1>SeeKi Documentation</h1>
            <p class="subtitle">Read-only, spreadsheet-like database viewer. data-seeKing.</p>
            {sections if sections else '<p class="empty">No documentation pages yet.</p>'}
          </body>
          </html>
          """

          lines = page.split("\n")
          output = "\n".join(l[10:] if l.startswith("          ") else l for l in lines)

          with open(os.path.join(docs_dir, "index.html"), "w") as out:
              out.write(output)

          print(f"Generated docs/index.html listing {len(html_files)} files across {len(groups)} groups")
          EOF

      - name: Push to docs branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin docs 2>/dev/null || true

          if git ls-remote --exit-code origin docs > /dev/null 2>&1; then
            git worktree add /tmp/docs-deploy docs
          else
            git worktree add --orphan -b docs /tmp/docs-deploy
          fi

          rm -rf /tmp/docs-deploy/*
          cp -a docs/. /tmp/docs-deploy/

          cd /tmp/docs-deploy
          git add --all
          if git diff --staged --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "deploy: update documentation [skip ci]"
            git push origin docs
          fi

          cd -
          git worktree remove /tmp/docs-deploy
