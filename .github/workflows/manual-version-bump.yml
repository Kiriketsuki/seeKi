name: Manual Version Bump

on:
    workflow_dispatch:
        inputs:
            bump_type:
                description: "Bump type"
                required: true
                type: choice
                options:
                    - year-rollover
                    - major
                    - minor
                    - patch
                    - exact
            exact_version:
                description: "Exact version (only used when bump_type is 'exact')"
                required: false
                type: string

jobs:
    bump-version:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Read current version
              id: current_version
              run: |
                  if [ -f VERSION ]; then
                    CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
                    echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
                    echo "Current version: $CURRENT_VERSION"
                  else
                    echo "No VERSION file found"
                    exit 1
                  fi

            - name: Calculate new version
              id: new_version
              run: |
                  CURRENT="${{ steps.current_version.outputs.current }}"
                  BUMP_TYPE="${{ github.event.inputs.bump_type }}"

                  if [ "$BUMP_TYPE" = "exact" ]; then
                    EXACT="${{ github.event.inputs.exact_version }}"
                    if [ -z "$EXACT" ]; then
                      echo "Error: exact_version is required when bump_type is 'exact'"
                      exit 1
                    fi
                    # Validate format
                    if ! echo "$EXACT" | grep -qE '^[0-9]{2}\.[0-9]+\.[0-9]+\.[0-9]+[a-zA-Z]*$'; then
                      echo "Error: Invalid version format: $EXACT"
                      exit 1
                    fi
                    echo "new=$EXACT" >> $GITHUB_OUTPUT
                    echo "Setting exact version: $EXACT"
                    exit 0
                  fi

                  # Parse YY.Major.Minor.Patch[Suffix]
                  if [[ $CURRENT =~ ^([0-9]{2})\.([0-9]+)\.([0-9]+)\.([0-9]+)([a-zA-Z]*)$ ]]; then
                    YY="${BASH_REMATCH[1]}"
                    MAJOR="${BASH_REMATCH[2]}"
                    MINOR="${BASH_REMATCH[3]}"
                    PATCH="${BASH_REMATCH[4]}"
                  else
                    echo "Error: Invalid version format: $CURRENT"
                    exit 1
                  fi

                  CURRENT_YY=$(date +%y)

                  case "$BUMP_TYPE" in
                    year-rollover)
                      NEW_VERSION="${CURRENT_YY}.0.0.0"
                      ;;
                    major)
                      MAJOR=$((MAJOR + 1))
                      MINOR=0
                      PATCH=0
                      NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                      ;;
                    minor)
                      MINOR=$((MINOR + 1))
                      PATCH=0
                      NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                      ;;
                    patch)
                      PATCH=$((PATCH + 1))
                      NEW_VERSION="$YY.$MAJOR.$MINOR.$PATCH"
                      ;;
                  esac

                  echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "New version: $NEW_VERSION"

            - name: Update version files
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"

                  echo "$NEW_VERSION" > VERSION
                  echo "Updated VERSION to $NEW_VERSION"

                  if [ -f package.json ]; then
                    sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" package.json
                    echo "Updated package.json to $NEW_VERSION"
                  fi

                  if [ -f README.md ]; then
                    sed -i "s|version-[0-9a-zA-Z.]*-blue|version-$NEW_VERSION-blue|" README.md
                    echo "Updated README badge to $NEW_VERSION"
                  fi

                  find . -maxdepth 4 -name "pyproject.toml" \
                    -not -path "*/node_modules/*" \
                    -not -path "*/.pio/*" \
                    -not -path "*/vendor/*" \
                    -not -path "*/.venv/*" | while read -r f; do
                    if grep -q '^version' "$f"; then
                      sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" "$f"
                      echo "Updated $f to $NEW_VERSION"
                    fi
                  done

            - name: Commit and push
              run: |
                  NEW_VERSION="${{ steps.new_version.outputs.new }}"

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --cached --quiet && { echo "No changes to commit"; exit 0; }

                  git commit -m "ci: manual version bump to $NEW_VERSION [skip ci]"
                  git push origin ${{ github.ref_name }}

            - name: Summary
              run: |
                  echo "## Manual Version Bump Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Bump Type**: ${{ github.event.inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Previous Version**: ${{ steps.current_version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **New Version**: ${{ steps.new_version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
