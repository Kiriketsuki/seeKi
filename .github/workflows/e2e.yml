name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      all_browsers:
        description: 'Run on all browsers (Chrome + Firefox + WebKit)'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: seeki_test
          POSTGRES_PASSWORD: seeki_test
          POSTGRES_DB: seeki_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-e2e-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium ${{ inputs.all_browsers == 'true' && 'firefox webkit' || '' }}

      - name: Seed test database
        run: |
          PGPASSWORD=seeki_test psql -h localhost -U seeki_test -d seeki_test -f tests/fixtures/seed.sql
        continue-on-error: true

      - name: Create .env.test
        run: |
          cat > .env.test <<'EOF'
          SEEKI_TEST_DB_USER=seeki_test
          SEEKI_TEST_DB_PASSWORD=seeki_test
          SEEKI_TEST_DB_HOST=localhost
          SEEKI_TEST_DB_PORT=5432
          SEEKI_TEST_DB_NAME=seeki_test
          EOF

      - name: Build frontend
        run: cd frontend && VITE_MOCK=false npm run build

      - name: Build release binary
        run: cargo build --release

      - name: Run E2E tests
        run: cd frontend && SEEKI_SKIP_BUILD=1 SEEKI_ALL_BROWSERS=${{ inputs.all_browsers == 'true' && '1' || '0' }} npx playwright test
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
