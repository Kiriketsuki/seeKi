name: "[Task] Task"
description: Create a task for a specific piece of work
title: "[Task]: "
labels: ["task"]
body:
    - type: markdown
      attributes:
          value: |
              Create a task to track a specific piece of work. Tasks branch from `main` and when merged back to `main` will bump the **Major** version (3rd digit: YY.MM.**X**.0). The target branch will be rebased before merge to ensure a linear history.

              Sub-issues (features or bugs) tracked inside a Task will automatically branch from the task branch.

    - type: input
      id: branch_off
      attributes:
          label: Branch off
          description: |
              Optional. The base branch this issue's branch and PR should target.
              Leave as `main` for the default. Set to a specific branch name (e.g.
              `feature/149-new-trip-flow`) when this work is a sub-task of an
              existing in-flight branch and the auto-handler should slot it under
              that branch instead of `main`.
              Parsed by `.github/workflows/issue-branch-handler.yml`.
          placeholder: main
          value: main
      validations:
          required: false

    - type: textarea
      id: description
      attributes:
          label: Description
          description: A clear and concise description of the task.
          placeholder: What needs to be done?
      validations:
          required: true

    - type: textarea
      id: acceptance_criteria
      attributes:
          label: Acceptance Criteria
          description: List the criteria that must be met for this task to be considered complete.
          placeholder: |
              - [ ] Criterion 1
              - [ ] Criterion 2
      validations:
          required: true

    - type: textarea
      id: additional
      attributes:
          label: Additional context
          description: Any other context, links, or technical notes.
      validations:
          required: false
