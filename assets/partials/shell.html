<!--
  SeeKi documentation page shell.
  Copy this file, replace <title>, the <!-- CONTENT --> block, and the data-page attribute.
  Paste the nav.html sidebar snippet inside the <aside>. Mark the active link.
-->
<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SeeKi Documentation</title>
    <meta name="description" content="SeeKi — a quiet, read-only database browser for people who shouldn't need to learn SQL." />
    <link rel="icon" type="image/svg+xml" href="/seeKi/assets/img/favicon.svg" />
    <link rel="stylesheet" href="/seeKi/assets/css/site.css" />
    <script>
      // Apply stored theme before first paint to avoid flash.
      (function () {
        try {
          var t = localStorage.getItem('sk-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div class="sk-shell">
      <header class="sk-topbar sk-glass" role="banner">
        <a class="sk-topbar__brand sk-brand" href="/seeKi/" aria-label="SeeKi — home">
          <span class="sk-wordmark">see<span class="sk-wordmark__accent">Ki</span></span>
          <span class="sk-topbar__tagline">read-only database browser</span>
        </a>
        <div class="sk-topbar__actions">
          <button class="sk-theme-toggle" type="button" aria-label="Toggle theme" data-sk-theme-toggle>
            <span class="sk-theme-toggle__label" data-sk-theme-label>Light</span>
          </button>
          <a class="sk-topbar__link" href="https://github.com/kiriketsuki/seeKi" rel="noopener">GitHub</a>
        </div>
      </header>

      <aside class="sk-sidebar sk-glass" aria-label="Site navigation">
        <!-- PASTE /assets/partials/nav.html CONTENTS HERE -->
      </aside>

      <main class="sk-content" role="main">
        <!-- CONTENT -->
      </main>

      <footer class="sk-footer" role="contentinfo">
        <div class="sk-footer__inner">
          <span class="sk-footer__brand">SeeKi</span>
          <span class="sk-footer__meta">Read-only. Local. Source-of-truth.</span>
          <nav class="sk-footer__links" aria-label="Footer">
            <a href="/seeKi/sitemap.html">Sitemap</a>
            <a href="/seeKi/project/contributing.html">Contributing</a>
            <a href="https://github.com/kiriketsuki/seeKi" rel="noopener">GitHub</a>
          </nav>
        </div>
      </footer>
    </div>

    <script src="/seeKi/assets/js/theme.js" defer></script>
  </body>
</html>
